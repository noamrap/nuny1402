<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioLearn - ביוטכנולוגיה ותרביות תאים</title>
    <style>
        :root {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-color: #00ff88;
            --accent-hover: #00cc6a;
            --error-color: #ff4d4d;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--container-bg);
            padding: 15px 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            margin-bottom: 20px;
            border-bottom: 3px solid var(--accent-color);
        }

        .stats {
            font-size: 1.2rem;
            font-weight: bold;
        }

        .xp-bar-container {
            width: 200px;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 5px;
        }

        .xp-bar {
            height: 10px;
            background: var(--accent-color);
            width: 0%;
            transition: width 0.5s ease-in-out;
        }

        .module-container {
            background: var(--container-bg);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            margin-bottom: 20px;
            display: none; /* Hidden by default, shown via JS */
            animation: fadeIn 0.5s;
        }

        .module-container.active {
            display: block;
        }

        h1, h2, h3 { color: var(--accent-color); }
        
        .citation {
            font-size: 0.8rem;
            color: #888;
            vertical-align: super;
        }

        .quiz-section {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #444;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 15px;
        }

        button {
            background: #333;
            color: white;
            border: 1px solid #555;
            padding: 12px 20px;
            font-size: 1rem;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: right;
            font-family: inherit;
        }

        button:hover {
            background: #444;
            border-color: var(--accent-color);
        }

        button.correct {
            background: var(--accent-color);
            color: #000;
            border-color: var(--accent-color);
        }

        button.wrong {
            background: var(--error-color);
            border-color: var(--error-color);
        }

        .feedback {
            margin-top: 15px;
            font-weight: bold;
            min-height: 25px;
        }

        .next-btn {
            display: none;
            background: var(--accent-color);
            color: #000;
            font-weight: bold;
            margin-top: 20px;
            width: 100%;
            text-align: center;
        }

        .next-btn:hover { background: var(--accent-hover); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <h2>BioLearn: מערכת אימון</h2>
        </div>
        <div class="stats">
            <div id="rankDisplay">דרגה: מתלמד</div>
            <div>XP: <span id="xpDisplay">0</span> / <span id="xpTarget">100</span></div>
            <div class="xp-bar-container"><div class="xp-bar" id="xpBar"></div></div>
        </div>
    </div>

    <div id="app">
        </div>

    <script>
        // Database of lessons and quizzes based on the presentation data
        const modules = [
            {
                id: 1,
                title: "שלב 1: תרבית ראשונית והכנת תאים",
                content: `
                    <p>התהליך מתחיל בבחירת בעל החיים ובקביעת קטע הרקמה שיילקח ממנו[cite: 19]. נוטלים דגימה על ידי ביופסיה ומפרקים את הרקמה לתאים בעזרת טיפול מכאני וטיפול אנזימטי (למשל בעזרת טריפסין)[cite: 20].</p>
                    <p>לאחר הפירוק, מתקבלת תערובת הטרוגנית (לא אחידה) של סוגי תאים שמקורם ברקמה המקורית[cite: 21]. מגדלים אותם באינקובטור בטמפרטורה של 37 מעלות, 95% לחות, ו-5% פחמן דו חמצני[cite: 22].</p>
                    <h3>תרבית ראשונית</h3>
                    <p>מקורה ישירות מגוף בעל החיים. זוהי תרבית של תאים הנצמדים למשטח הגידול (רובד חד-שכבתי / Monolayer) ובעלת אורך חיים מוגבל של עד שבועיים[cite: 39, 44, 46]. אוכלוסיית התאים היא מגוונת ולא אחידה[cite: 41].</p>
                    <p>כאשר התאים ממלאים את הצלחת, מופעל מנגנון "עיכוב על ידי מגע", והם מפסיקים להתחלק[cite: 82, 85].</p>
                `,
                question: "מדוע התרבית הראשונית מוגדרת כ'הטרוגנית'?",
                options: [
                    "מכיוון שהיא מכילה רק סוג אחד של תאים מותמרים.",
                    "מכיוון שהיא מורכבת מסוגים שונים של תאים שמקורם ברקמה המקורית, המתחרים ביניהם.",
                    "מכיוון שהתאים בה מתחלקים ללא הפסקה בחיי נצח.",
                    "מכיוון שהיא גדלה בתוך ביוריאקטור תעשייתי."
                ],
                correctAnswer: 1,
                successMsg: "מדויק! הפירוק הראשוני נותן לנו 'סלט' של תאים מהרקמה המקורית, ולכן הם לא אחידים[cite: 41]. +50 XP!"
            },
            {
                id: 2,
                title: "שלב 2: קווי תאים (סופי מול רציף)",
                content: `
                    <p>כדי להאריך את חיי התרבית הראשונית, מבצעים פיצולים והעברות, וכך מקבלים <strong>תרבית שניונית</strong>[cite: 48, 51]. עם הזמן, מתרחש תהליך של ברירה (סלקציה) והתרבית הופכת לאחידה יותר - זהו קו תאים[cite: 53, 54].</p>
                    <h3>קו תאים סופי (Finite Cell Line)</h3>
                    <p>יש לו מספר חלוקות מוגבל (70-50 פעמים) בגלל התקצרות הטלומרים בקצוות הכרומוזומים בכל חלוקה[cite: 62, 63]. מגבלה זו נקראת "מגבלת הייפליק"[cite: 64]. בתאים אלו האנזים טלומראז אינו פעיל מספיק, והתא בסוף מזדקן ומת[cite: 71, 72].</p>
                    <br>
                    <h3>קו תאים רציף (Continuous Cell Line)</h3>
                    <p>עבר שינוי גנטי (התמרה, מוטציה או הנדסה גנטית המפעילה את גן הטלומראז) וניצל מהזדקנות[cite: 74, 76, 77]. הוא רוכש חיי נצח, מאבד את ה"עיכוב על ידי מגע", ויכול לגדול כתרחיף וליצור צברים רב-שכבתיים[cite: 75, 82, 83, 85].</p>
                `,
                question: "מהו ההבדל המרכזי שמאפשר לקו תאים רציף להמשיך להתחלק לנצח בניגוד לקו תאים סופי?",
                options: [
                    "קו תאים רציף תמיד גדל ברובד חד שכבתי מסודר.",
                    "בקו תאים רציף יש פעילות של האנזים טלומראז (עקב התמרה או שינוי גנטי) שמונעת את התקצרות הטלומרים.",
                    "קו תאים רציף עובר פירוק אנזימטי בעזרת טריפסין בכל פעם מחדש.",
                    "קו תאים רציף לא צריך אינקובטור כדי לשרוד."
                ],
                correctAnswer: 1,
                successMsg: "תשובה מושלמת. הפעלת הטלומראז משמרת את הטלומרים ומונעת את 'מגבלת הייפליק'[cite: 64, 76]. +50 XP!"
            },
            {
                id: 3,
                title: "שלב 3: מחזור התא ונקודות בקרה",
                content: `
                    <p>התא האאוקריוטי מתחלק לארבע פאזות עיקריות[cite: 119]:</p>
                    <ul>
                        <li><strong>G1 (גדילה):</strong> התא גדל בנפחו ומתבצע בו חילוף חומרים[cite: 129, 130].</li>
                        <li><strong>S (סינתזה):</strong> שלב ה-DNA. פה מתבצע שכפול ה-DNA בגרעין[cite: 131].</li>
                        <li><strong>G2:</strong> הכנה לחלוקה[cite: 132].</li>
                        <li><strong>M (מיטוזה):</strong> חלוקת הגרעין והתא לשני תאי בת[cite: 139].</li>
                    </ul>
                    <br>
                    <p>לתא יש 3 צמתי בקרה ("רמזור אדום") כדי למנוע חלוקה של תא פגום: בסוף G1, בשלב G2 (לפני הכניסה למיטוזה), ובסוף שלב M (לפני חלוקת התא)[cite: 134, 136, 137, 139].</p>
                `,
                question: "באיזה שלב במחזור התא מתבצעת הכפלת החומר התורשתי (ה-DNA)?",
                options: [
                    "שלב G1",
                    "שלב M",
                    "שלב S",
                    "שלב G2"
                ],
                correctAnswer: 2,
                successMsg: "נכון מאוד! שלב S (Synthesis) הוא השלב בו נוצרים שני עותקים זהים של הכרומוזומים[cite: 131, 140]. +50 XP!"
            },
            {
                id: 4,
                title: "שלב 4: גידול מסחרי - מנתי מול רציף",
                content: `
                    <p>כדי לגדל תאים בכמויות מסחריות (למשל לשם הפקת חלבונים) משתמשים בביוריאקטורים. ישנן שתי גישות עיקריות:</p>
                    <h3>גידול מנתי (Batch)</h3>
                    <p>מערכת סגורה. מזינים חומרי גלם פעם אחת. התאים גדלים, ורק בסוף התהליך מוציאים את התוצר[cite: 173, 178, 182, 183]. החיסרון: המצע מידלדל והפסולת מצטברת. הבקרה לרוב ידנית[cite: 179].</p>
                    <h3>גידול רציף (Continuous)</h3>
                    <p>מערכת פתוחה וממוחשבת. מזרימים ברצף מצע טרי, ובמקביל שואבים מצע ישן עם תאים. זה שומר את התאים בשלב הגידול המעריכי (Log phase) בקצב קבוע[cite: 174, 189, 190, 191, 194].</p>
                    <br>
                `,
                question: "מהו היתרון הבולט של גידול רציף על פני גידול מנתי?",
                options: [
                    "הוא דורש רק ערבול מגנטי פשוט ללא חיישנים.",
                    "הוא מערכת סגורה שלא דורשת הוספת חומרים לאחר ההתחלה.",
                    "הזרמת מצע טרי וסילוק פסולת ברצף משאירה את התאים בשלב גידול מעריכי (Log) לאורך זמן.",
                    "הוא מתאים רק לתאים נורמליים שזקוקים למשטח כדי לגדול."
                ],
                correctAnswer: 2,
                successMsg: "מעולה! בקרה ממוחשבת והחלפת מצע רציפה מונעות הצטברות פסולת ומשמרות התרבות מקסימלית[cite: 189, 191]. הגעת לסוף המודול! +50 XP!"
            }
        ];

        let currentModuleIndex = 0;
        let xp = 0;
        let ranks = ["מתלמד", "לבורנט משנה", "חוקר", "מדען בכיר", "אגדת ביוטק"];

        const appDiv = document.getElementById('app');
        const xpDisplay = document.getElementById('xpDisplay');
        const xpTarget = document.getElementById('xpTarget');
        const xpBar = document.getElementById('xpBar');
        const rankDisplay = document.getElementById('rankDisplay');

        function updateStats(addedXP) {
            xp += addedXP;
            xpDisplay.innerText = xp;
            
            let target = (Math.floor(xp / 100) + 1) * 100;
            xpTarget.innerText = target;
            
            let percentage = ((xp % 100) / 100) * 100;
            if (xp > 0 && xp % 100 === 0) percentage = 100; 
            xpBar.style.width = percentage + '%';

            let rankIndex = Math.min(Math.floor(xp / 50), ranks.length - 1);
            rankDisplay.innerText = "דרגה: " + ranks[rankIndex];
        }

        function renderModule(index) {
            appDiv.innerHTML = ''; // Clear container
            
            if(index >= modules.length) {
                appDiv.innerHTML = `
                    <div class="module-container active" style="text-align: center;">
                        <h2>כל הכבוד! סיימת את כל תכני הלימוד הבסיסיים! 🎉</h2>
                        <p>אתה מוכן לעבור לשלב הבא: מבחן ה-50 שאלות.</p>
                        <p>פשוט תגיד למערכת את מילת הקוד כדי להתחיל בסימולציית המבחן המלאה.</p>
                    </div>`;
                return;
            }

            const mod = modules[index];
            const html = `
                <div class="module-container active" id="mod-${mod.id}">
                    <h2>${mod.title}</h2>
                    <div>${mod.content}</div>
                    
                    <div class="quiz-section">
                        <h3>בדיקת הבנה:</h3>
                        <p>${mod.question}</p>
                        <div class="options" id="options-${mod.id}">
                            ${mod.options.map((opt, i) => 
                                `<button onclick="checkAnswer(${index}, ${i}, this)">${opt}</button>`
                            ).join('')}
                        </div>
                        <div class="feedback" id="feedback-${mod.id}"></div>
                        <button class="next-btn" id="nextBtn-${mod.id}" onclick="nextModule()">המשך לשלב הבא</button>
                    </div>
                </div>
            `;
            appDiv.innerHTML = html;
        }

        window.checkAnswer = function(moduleIndex, selectedOption, btnElement) {
            const mod = modules[moduleIndex];
            const feedback = document.getElementById(`feedback-${mod.id}`);
            const nextBtn = document.getElementById(`nextBtn-${mod.id}`);
            const optionsDiv = document.getElementById(`options-${mod.id}`);
            const buttons = optionsDiv.getElementsByTagName('button');

            // Disable all buttons after click
            for(let b of buttons) {
                b.disabled = true;
                if(b === btnElement && selectedOption !== mod.correctAnswer) {
                    b.classList.add('wrong');
                }
            }

            if (selectedOption === mod.correctAnswer) {
                btnElement.classList.add('correct');
                feedback.style.color = "var(--accent-color)";
                feedback.innerHTML = mod.successMsg;
                updateStats(50);
                nextBtn.style.display = 'block';
            } else {
                feedback.style.color = "var(--error-color)";
                feedback.innerHTML = "תשובה שגויה. רענן את העמוד או נסה לשנות את הקוד כדי להמשיך ;)";
                buttons[mod.correctAnswer].classList.add('correct'); // Show correct answer
            }
        };

        window.nextModule = function() {
            currentModuleIndex++;
            renderModule(currentModuleIndex);
        };

        // Initialize the app
        renderModule(currentModuleIndex);
    </script>
</body>
</html>
